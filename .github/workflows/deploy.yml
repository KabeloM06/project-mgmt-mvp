name: Build and Deploy Core Infrastructure

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK Runtime
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Compile & Publish Backend
        working-directory: backend
        run: dotnet publish -c Release -o ./publish

      - name: Compile & Publish Function Worker
        working-directory: function-app
        run: dotnet publish -c Release -o ./publish

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload Compiled Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish

      - name: Upload Compiled Function Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: function-publish
          path: function-app/publish

      - name: Upload Compiled Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-publish
          path: frontend/dist/frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v4

      - name: Download Backend Workspace
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./backend_publish

      - name: Download Function Workspace
        uses: actions/download-artifact@v4
        with:
          name: function-publish
          path: ./function_publish

      - name: Download Frontend Workspace
        uses: actions/download-artifact@v4
        with:
          name: frontend-publish
          path: ./frontend_publish

      - name: Authenticate to Azure via OpenID Connect / Service Principal
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ==========================================
      # 🚀 IAC INFRASTRUCTURE ENFORCEMENT STEP
      # ==========================================
      - name: Provision & Sync Azure Infrastructure via Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./main.bicep
          failOnTargetValidationError: true

      # ==========================================
      # CODE DEPLOYMENTS
      # ==========================================
      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'project-mgmt-api-gyvhzwhlex23g'
          package: './backend_publish'
          app-settings: |
            AllowedOrigins=https://project-mgmt-frontend-gyvhzwhlex23g.azurewebsites.net

      - name: Deploy Worker to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: 'project-mgmt-worker-gyvhzwhlex23g'
          package: './function_publish'

      - name: Deploy Frontend to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'project-mgmt-frontend-gyvhzwhlex23g'
          package: './frontend_publish'